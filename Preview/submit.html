<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Access Record Submission — AccessTracker</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --primary: #DA2128; --primary-dark: #b81b21; --primary-light: #fdeaea;
            --primary-glow: rgba(218,33,40,0.12);
            --bg: #f0f2f5; --surface: #fff; --text: #1c1c2e; --text-secondary: #4a5568;
            --text-muted: #8892a4; --border: #e2e5ec;
            --success-bg: #ecfdf5; --success-border: #34d399; --success-text: #065f46;
            --radius: 8px; --radius-lg: 12px;
            --shadow: 0 1px 3px rgba(0,0,0,0.07), 0 1px 2px rgba(0,0,0,0.04);
        }
        html { font-size: 16px; }
        body { font-family: "Segoe UI", system-ui, -apple-system, sans-serif; background: var(--bg); color: var(--text); line-height: 1.65; min-height: 100vh; }

        /* Header — no nav, public page */
        .page-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; padding: 1.25rem 2rem;
            box-shadow: 0 2px 12px rgba(218,33,40,0.2);
            display: flex; align-items: center; gap: 1rem;
        }
        .page-header h1 { font-size: 1.35rem; font-weight: 700; letter-spacing: -0.02em; margin: 0; color: #fff; }
        .page-header .subtitle { font-size: 0.82rem; opacity: 0.8; margin-top: 0.15rem; }

        .container { margin: 0 auto; padding: 2rem 1.5rem; max-width: 760px; }

        /* Fieldset — accent stripe via block ::before, legend floated */
        fieldset {
            border: none; border-radius: var(--radius-lg); padding: 0;
            margin-bottom: 1.25rem; background: var(--surface); box-shadow: var(--shadow);
            overflow: hidden;
        }
        fieldset::before {
            content: ''; display: block; height: 3px;
            background: linear-gradient(90deg, var(--primary) 0%, var(--primary-dark) 100%);
        }
        legend {
            display: block; float: left; width: 100%;
            padding: 0.85rem 1.75rem 0;
            font-size: 0.78rem; font-weight: 700; color: var(--primary);
            text-transform: uppercase; letter-spacing: 0.06em;
        }
        fieldset::after { content: ''; display: table; clear: both; }
        fieldset .form-group, fieldset .form-row, fieldset .checkbox-group {
            padding-left: 1.75rem; padding-right: 1.75rem;
        }
        fieldset .form-group:first-of-type, fieldset .form-row:first-of-type { padding-top: 0.85rem; }
        fieldset .form-group:last-child, fieldset .form-row:last-child, fieldset .checkbox-group:last-child { padding-bottom: 1.5rem; }

        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-weight: 600; margin-bottom: 0.4rem; font-size: 0.88rem; color: var(--text); letter-spacing: 0.01em; }
        .req { color: var(--primary); font-weight: 700; }
        .form-group input[type="text"], .form-group input[type="url"], .form-group input[type="email"],
        .form-group input[type="date"], .form-group select, .form-group textarea {
            width: 100%; padding: 0.6rem 0.85rem; border: 1.5px solid var(--border); border-radius: var(--radius);
            font-size: 0.95rem; font-family: inherit; background: #fafbfc; color: var(--text); transition: all 0.2s;
        }
        .form-group input:focus, .form-group select:focus, .form-group textarea:focus {
            outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-glow); background: #fff;
        }
        .form-group textarea { resize: vertical; }
        .checkbox-group label { display: inline-flex; align-items: center; gap: 0.5rem; font-weight: 500; cursor: pointer; color: var(--text-secondary); }
        .checkbox-group input[type="checkbox"] { width: 1.15rem; height: 1.15rem; accent-color: var(--primary); }
        .form-row { display: flex; gap: 1rem; }
        .form-group.half { flex: 1; padding-left: 0 !important; padding-right: 0 !important; }

        .form-actions { margin-top: 2rem; text-align: center; }
        .form-actions button {
            display: inline-block; padding: 0.75rem 2.5rem;
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-dark) 100%);
            color: #fff; border: none; border-radius: var(--radius); font-size: 1rem; font-weight: 700;
            cursor: pointer; transition: all 0.2s; box-shadow: 0 2px 8px rgba(218,33,40,0.25); letter-spacing: 0.02em;
        }
        .form-actions button:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(218,33,40,0.35); }
        .success-banner {
            background: var(--success-bg); border-left: 4px solid var(--success-border); color: var(--success-text);
            padding: 1.5rem 1.75rem; border-radius: var(--radius); font-size: 1.1rem; font-weight: 600; box-shadow: var(--shadow);
        }
        @media (max-width: 768px) { .form-row { flex-direction: column; gap: 0; } .page-header { padding: 1rem; } .page-header h1 { font-size: 1.1rem; } }
    </style>
</head>
<body>
    <div class="page-header">
        <div>
            <h1>Access Record Submission</h1>
            <div class="subtitle">Register your system access for tracking and continuity planning</div>
        </div>
    </div>

    <div class="container">
        <form id="mainForm" onsubmit="event.preventDefault(); this.style.display='none'; document.getElementById('success').style.display='block';">

            <fieldset>
                <legend>User Information</legend>
                <div class="form-group">
                    <label>Full Name <span class="req">*</span></label>
                    <input type="text" required />
                </div>
                <div class="form-group">
                    <label>Username <span class="req">*</span></label>
                    <input type="text" required />
                </div>
                <div class="form-group">
                    <label>Department</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option>Accounting</option><option>Administration</option><option>Business Development</option>
                        <option>Customer Service</option><option>Engineering</option><option>Finance</option>
                        <option>Human Resources</option><option>IT</option><option>Legal</option>
                        <option>Marketing</option><option>Operations</option><option>Procurement</option>
                        <option>Quality Assurance</option><option>Sales</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Job Title</label>
                    <input type="text" />
                </div>
            </fieldset>

            <fieldset>
                <legend>System Information</legend>
                <div class="form-group">
                    <label>System Name <span class="req">*</span></label>
                    <input type="text" required />
                </div>
                <div class="form-group">
                    <label>URL</label>
                    <input type="url" />
                </div>
                <div class="form-group">
                    <label>Category</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option>Finance</option><option>HR</option><option>E-Signature</option>
                        <option>CRM</option><option>Dev Tool</option><option>Other</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Account Type</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option>Individual</option><option>Shared</option><option>Service</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Access Details</legend>
                <div class="form-group">
                    <label>Access Type</label>
                    <select id="accessTypeSelect">
                        <option value="">-- Select --</option>
                        <option>Read</option><option>Write</option><option>Admin</option><option>Other</option>
                    </select>
                </div>
                <div class="form-group" id="accessTypeOtherGroup" style="display:none;">
                    <label>Specify Access Type</label>
                    <input type="text" />
                </div>
                <div class="form-group">
                    <label>Authentication Method</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option>Username/Password</option><option>SSO</option><option>MFA</option>
                        <option>API Key</option><option>Other</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Business Context</legend>
                <div class="form-group">
                    <label>Business Reason <span class="req">*</span></label>
                    <textarea rows="5" required></textarea>
                </div>
                <div class="form-group">
                    <label>Business Process</label>
                    <textarea rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Impact if Lost</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option>Low</option><option>Medium</option><option>High</option><option>Critical</option>
                    </select>
                </div>
            </fieldset>

            <fieldset>
                <legend>Continuity Plan</legend>
                <div class="form-group">
                    <label>Secondary Contact Name <span class="req">*</span></label>
                    <input type="text" required />
                </div>
                <div class="form-group">
                    <label>Secondary Contact Email</label>
                    <input type="email" />
                </div>
                <div class="form-group">
                    <label>What should be done if user is unavailable <span class="req">*</span></label>
                    <textarea rows="4" required></textarea>
                </div>
            </fieldset>

            <fieldset>
                <legend>Lifecycle</legend>
                <div class="form-row">
                    <div class="form-group half">
                        <label>Start Date</label>
                        <input type="date" />
                    </div>
                    <div class="form-group half">
                        <label>End Date</label>
                        <input type="date" />
                    </div>
                </div>
                <div class="form-group checkbox-group">
                    <label><input type="checkbox" /> Temporary Access</label>
                </div>
            </fieldset>

            <fieldset>
                <legend>Additional Information</legend>
                <div class="form-group">
                    <label>System Criticality Level</label>
                    <select>
                        <option value="">-- Select --</option>
                        <option value="Low">Low - Minimal business impact</option>
                        <option value="Medium">Medium - Noticeable disruption</option>
                        <option value="High">High - Significant operational impact</option>
                        <option value="Critical">Critical - Business cannot function</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Backup Access Method</label>
                    <textarea rows="3"></textarea>
                </div>
                <div class="form-group">
                    <label>Notes</label>
                    <textarea rows="3"></textarea>
                </div>
            </fieldset>

            <div class="form-actions">
                <button type="submit">Submit Access Record</button>
            </div>
        </form>

        <div id="success" class="success-banner" style="display:none;">
            Your access record has been saved.
        </div>
    </div>

    <script>
        document.getElementById('accessTypeSelect').addEventListener('change', function() {
            document.getElementById('accessTypeOtherGroup').style.display = this.value === 'Other' ? 'block' : 'none';
        });
    </script>
</body>
</html>
